<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Focus AI</title>
    <link rel="stylesheet" href="# style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Exam Focus AI</h1>
            <p>Upload your PDF notes or text files to instantly generate AI study resources!</p>
        </header>

        <main>
            <section class="upload-section">
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput" class="file-label">Choose File (PDF or TXT):</label>
                        <input type="file" id="fileInput" accept=".pdf,.txt" required>
                    </div>

                    <div class="form-group">
                        <label for="focusOption">What do you want to generate?</label>
                        <select id="focusOption">
                            <option value="summary">Structured Summary</option>
                            <option value="concepts">Core Concepts & Definitions</option>
                            <option value="questions">Practice Questions & Answers</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn">Generate Study Guide</button>
                </form>
            </section>

            <section class="status-section">
                <p id="statusText"></p>
            </section>

            <section class="result-section">
                <div id="result" class="markdown-body" style="display: none;"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
